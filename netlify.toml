[build]
  command   = "echo 'Using pre-built static output'"
  publish   = "out"

[build.environment]
  NODE_VERSION              = "20"
  NETLIFY_NEXT_PLUGIN_SKIP  = "true"

# Redirect /donate to home (it auto-redirects in Next.js too)
[[redirects]]
  from   = "/donate"
  to     = "/"
  status = 301

# Telugu language support — no trailing-slash issues
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options  = "nosniff"
    X-Frame-Options         = "DENY"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
